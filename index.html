<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe · PJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ BACKGROUND GRID EFFECT ░░ -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <!-- ░░ MAIN APP WRAPPER ░░ -->
  <div class="app" id="app">

    <!-- ── HEADER ── -->
    <header class="header">
      <h1 class="logo">PJ<span class="logo-x"></span></h1>
      <p class="logo-sub">Tic · Tac · Toe</p>

      <!-- Theme Toggle -->
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon" id="themeIcon">☀</span>
      </button>
    </header>

    <!-- ── MODE SELECTOR ── -->
    <section class="mode-selector" id="modeSelector" aria-label="Game mode">
      <button class="mode-btn active" data-mode="pvp" id="btnPvP">
        <span class="mode-icon">👥</span>
        <span class="mode-label">Player vs Player</span>
      </button>
      <button class="mode-btn" data-mode="ai" id="btnAI">
        <span class="mode-icon">🤖</span>
        <span class="mode-label">Player vs AI</span>
      </button>
    </section>

    <!-- ── SCOREBOARD ── -->
    <section class="scoreboard" aria-label="Scoreboard">
      <div class="score-card" id="scoreX">
        <div class="score-symbol x-symbol">X</div>
        <div class="score-info">
          <div class="score-name" id="nameX">Player X</div>
          <div class="score-value" id="scoreValueX">0</div>
        </div>
      </div>

      <div class="score-divider">
        <div class="draw-label">DRAWS</div>
        <div class="draw-value" id="scoreValueDraw">0</div>
      </div>

      <div class="score-card" id="scoreO">
        <div class="score-symbol o-symbol">O</div>
        <div class="score-info">
          <div class="score-name" id="nameO">Player O</div>
          <div class="score-value" id="scoreValueO">0</div>
        </div>
      </div>
    </section>

    <!-- ── STATUS MESSAGE ── -->
    <div class="status-bar" id="statusBar" aria-live="polite">
      <span class="status-indicator" id="statusIndicator"></span>
      <span class="status-text" id="statusText">Player X's Turn</span>
    </div>

    <!-- ── GAME BOARD ── -->
    <main class="board-wrapper">
      <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe Board">
        <!-- 9 cells generated by JS, but we scaffold them here for SEO/accessibility -->
        <button class="cell" data-index="0" aria-label="Cell 1" role="gridcell"></button>
        <button class="cell" data-index="1" aria-label="Cell 2" role="gridcell"></button>
        <button class="cell" data-index="2" aria-label="Cell 3" role="gridcell"></button>
        <button class="cell" data-index="3" aria-label="Cell 4" role="gridcell"></button>
        <button class="cell" data-index="4" aria-label="Cell 5" role="gridcell"></button>
        <button class="cell" data-index="5" aria-label="Cell 6" role="gridcell"></button>
        <button class="cell" data-index="6" aria-label="Cell 7" role="gridcell"></button>
        <button class="cell" data-index="7" aria-label="Cell 8" role="gridcell"></button>
        <button class="cell" data-index="8" aria-label="Cell 9" role="gridcell"></button>
      </div>
    </main>

    <!-- ── CONTROLS ── -->
    <div class="controls">
      <button class="btn-restart" id="btnRestart" aria-label="Restart game">
        <span class="btn-icon">↺</span> New Game
      </button>
      <button class="btn-reset-score" id="btnResetScore" aria-label="Reset scores">
        Reset Scores
      </button>
    </div>

  </div><!-- /app -->

  <!-- ── WIN OVERLAY ── -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Game result" hidden>
    <div class="overlay-card">
      <div class="overlay-emoji" id="overlayEmoji">🏆</div>
      <h2 class="overlay-title" id="overlayTitle">Player X Wins!</h2>
      <p class="overlay-sub" id="overlaySub">Brilliant move sequence</p>
      <button class="overlay-btn" id="overlayBtn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
